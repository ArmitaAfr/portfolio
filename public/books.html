<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Books — Armita</title>

  <script src="./vendor/twgl-full.min.js"></script>
  <script src="./vendor/dat.gui.min.js"></script>
  <script src="./vendor/pako.min.js"></script>
  <script src="./vendor/UPNG.min.js"></script>

  <script type="module" src="./scripts/demo.js"></script>
  <script type="module" src="./scripts/ca.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Google Sans', Arial, Helvetica, sans-serif;
      color: #fff;
      background: #050b16;
    }

    #glCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      z-index: 0;
    }

    .page-overlay {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    .top-nav {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: calc(100vw - 24px);
      padding: 10px 14px;
      box-sizing: border-box;
      border-radius: 999px;
      background: rgba(10, 20, 40, 0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 8px 30px rgba(0, 0, 0, 0.28),
        0 0 18px rgba(0, 220, 255, 0.04);
      z-index: 20;
      pointer-events: auto;
    }

    .site-logo-link {
      position: fixed;
      top: 28px;
      left: 28px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      touch-action: manipulation;
      filter: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.28));
    }

    .site-logo-link img {
      display: block;
      width: auto;
      height: 62px;
      max-width: 100%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .nav-link {
      color: rgba(255, 255, 255, 0.88);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      padding: 8px 14px;
      border-radius: 999px;
      transition:
        color 0.25s ease,
        background 0.25s ease,
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .nav-link:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-1px);
      box-shadow: inset 0 1px 0 rgba(0, 220, 255, 0.18);
    }

    .nav-link.active {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
    }

    .page-content {
      position: absolute;
      top: 110px;
      left: 7%;
      right: 7%;
      max-width: 680px;
      pointer-events: auto;
    }

    .page-content h2 {
      margin: 0 0 24px 0;
      font-size: 2rem;
      font-weight: 600;
    }

    .book-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .book-item {
      position: relative;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(17, 31, 60, 0.26), rgba(10, 20, 40, 0.18));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      transition:
        transform 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease,
        background 0.25s ease;
    }

    .book-item::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: linear-gradient(180deg, rgba(180, 240, 255, 0.84), rgba(193, 164, 255, 0.58));
      pointer-events: none;
    }

    .book-item::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at 100% 0%, rgba(255, 255, 255, 0.08), transparent 34%);
      opacity: 0.7;
      pointer-events: none;
    }

    .book-item:hover {
      transform: translateY(-3px);
      border-color: rgba(180, 240, 255, 0.16);
      box-shadow:
        0 18px 34px rgba(0, 0, 0, 0.22),
        0 0 18px rgba(180, 240, 255, 0.06);
    }

    .book-item.open {
      background: linear-gradient(180deg, rgba(20, 34, 66, 0.32), rgba(10, 20, 40, 0.22));
      border-color: rgba(193, 164, 255, 0.2);
      box-shadow:
        0 18px 36px rgba(0, 0, 0, 0.24),
        0 0 18px rgba(138, 84, 255, 0.08);
    }

    .book-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 18px 18px 14px 20px;
      cursor: pointer;
      user-select: none;
      gap: 14px;
    }

    .book-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .book-title {
      font-size: 1rem;
      line-height: 1.35;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.94);
    }

    .book-author {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.01em;
    }

    .book-toggle {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.38);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      transition:
        transform 0.3s ease,
        color 0.25s ease,
        background 0.25s ease,
        border-color 0.25s ease;
    }

    .book-item.open .book-toggle {
      transform: rotate(45deg);
      color: rgba(255, 255, 255, 0.82);
      background: rgba(193, 164, 255, 0.12);
      border-color: rgba(193, 164, 255, 0.16);
    }

    .book-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.3s ease;
      padding: 0 18px 0 20px;
    }

    .book-item.open .book-body {
      max-height: 420px;
      padding: 0 18px 18px 20px;
    }

    .book-body p {
      margin: 0;
      font-size: 0.88rem;
      line-height: 1.68;
      color: rgba(255, 255, 255, 0.64);
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      padding-top: 13px;
    }

    .book-body p:empty {
      display: none;
    }

    .book-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
    }

    .book-link {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(180, 240, 255, 0.16);
      background: rgba(180, 240, 255, 0.06);
      color: rgba(180, 240, 255, 0.95);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      transition:
        color 0.25s ease,
        background 0.25s ease,
        border-color 0.25s ease;
    }

    .book-link:hover {
      color: #ffffff;
      background: rgba(180, 240, 255, 0.12);
      border-color: rgba(180, 240, 255, 0.24);
    }

    @media (max-width: 900px) {
      .top-nav {
        top: 18px;
        gap: 4px;
        padding: 8px 8px;
      }

      .site-logo-link {
        top: 18px;
        left: 18px;
      }

      .site-logo-link img {
        height: 48px;
      }

      .nav-link {
        font-size: 0.88rem;
        padding: 8px 10px;
      }

      .page-content {
        top: 90px;
        left: 6%;
        right: 6%;
      }

      .book-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  <script src="./scripts/tracking-config.js" defer></script>
  <script src="./scripts/tracking.js" defer></script>


  <script type="module">
    import { Demo } from "./scripts/demo.js";

    window.demo = new Demo(canvas, false);

  <script>
    document.querySelectorAll('.book-header').forEach(header => {
      header.addEventListener('click', () => {
